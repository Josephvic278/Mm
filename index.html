<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Email Sender - Admin Panel</title>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

<script>

// Initialize EmailJS
emailjs.init("9L6-yT9SLTFOwAp5_");

function sendEmail(){

const templateParams = {

to_email: document.getElementById("to_email").value,
user_name: document.getElementById("user_name").value,
email_body: document.getElementById("email_body").value,
subject: document.getElementById("subject").value

};

emailjs.send("service_vl0ryh4","template_3zzittw",templateParams)

.then(function(){
alert("Email sent successfully!");
})

.catch(function(error){
console.log(error);
alert("Email failed to send");
});

}

</script>

<style>

body{
font-family: Arial, sans-serif;
padding:30px;
background:#f5f8fa;
}

.container{
max-width:500px;
background:white;
padding:25px;
border-radius:6px;
box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

h2{
margin-bottom:20px;
}

label{
display:block;
margin-top:15px;
font-weight:bold;
}

input, textarea{
width:100%;
padding:10px;
margin-top:5px;
border-radius:4px;
border:1px solid #ccc;
font-size:14px;
}

textarea{
height:120px;
resize:vertical;
}

button{
margin-top:20px;
padding:12px 20px;
font-size:16px;
background:#34aadc;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
width:100%;
}

button:hover{
background:#2c97c6;
}

</style>

</head>

<body>

<div class="container">

<h2>Send Withdrawal Email</h2>

<label>Email Subject</label>
<input type="text" id="subject" placeholder="Enter email subject">

<label>Recipient Email</label>
<input type="email" id="to_email" placeholder="Enter recipient email">

<label>User Name</label>
<input type="text" id="user_name" placeholder="Enter user name">

<label>Main Email Message</label>
<textarea id="email_body" placeholder="Type the full email message including amount"></textarea>

<button onclick="sendEmail()">Send Email</button>

</div>

</body>
</html>
