<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Send Email - Admin Panel</title>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

<script>

emailjs.init("9L6-yT9SLTFOwAp5_");

function sendEmail(){

const templateParams = {

to_email: document.getElementById("to_email").value,
user_name: document.getElementById("user_name").value,
email_body: document.getElementById("email_body").value,
batch: document.getElementById("batch").value

};

emailjs.send("service_o4xi661","template_3zzittw",templateParams)

.then(function(){
alert("Email sent successfully!");
})

.catch(function(error){
console.log(error);
alert("Email failed to send");
});

}

</script>

<style>

body{
font-family: Arial;
padding:30px;
background:#f5f8fa;
}

label{
display:block;
margin-top:15px;
font-weight:bold;
}

input, textarea{
width:100%;
padding:10px;
margin-top:5px;
border-radius:4px;
border:1px solid #ccc;
}

textarea{
height:120px;
}

button{
margin-top:20px;
padding:12px 20px;
font-size:16px;
background:#34aadc;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

</style>

</head>

<body>

<h2>Send Withdrawal Email</h2>

<label>Recipient Email</label>
<input type="email" id="to_email">

<label>User Name</label>
<input type="text" id="user_name">

<label>Main Email Message</label>
<textarea id="email_body" placeholder="Type the full email message including amount"></textarea>

<label>Transaction Batch</label>
<input type="text" id="batch">

<button onclick="sendEmail()">Send Email</button>

</body>
</html>
